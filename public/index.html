<!DOCTYPE html>
<html>
<head>
    <title>Broadcast Viewer</title>
</head>
<body>
    <h1>Broadcasts</h1>
    <div id="messages"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on("broadcast", (msg) => {
            const div = document.createElement("div");
            div.textContent = msg;
            document.getElementById("messages").appendChild(div);
        });
    </script>
</body>
</html>
